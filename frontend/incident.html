<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Incident Details</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="/style.css">
</head>
<body class="dark-theme">

	<header class="dashboard-header" style="padding:1rem 2rem;">
		<div class="header-row">
			<h1><span class="logo-icon">&#9881;</span> AI Maintenance Engineer</h1>
			<button class="incident-details-back" onclick="window.history.back()" style="border:none;background:var(--bg-card);color:var(--text-secondary);padding:0.5rem 1.2rem;border-radius:var(--radius-md);font-size:0.85rem;cursor:pointer;">&#8592; Back to Dashboard</button>
		</div>
	</header>

	<div class="incident-details-container">
		<h2>Incident Details</h2>
		<div id="incident-sections"></div>
		<div class="incident-details-back">
			<button onclick="window.history.back()">&#8592; Back to Dashboard</button>
		</div>
	</div>

	<footer>
		<small>&copy; 2026 Predictive Maintenance AI System</small>
	</footer>

	<script>
		const FAULT_TYPE_MAP = {
			0: 'None', 1: 'TWF', 2: 'HDF', 3: 'PWF', 4: 'OSF', 5: 'RNF',
			'TWF': 'TWF', 'HDF': 'HDF', 'PWF': 'PWF', 'OSF': 'OSF', 'RNF': 'RNF',
			'None': 'None', 'none': 'None', '0': 'None', '': 'None', null: 'None', undefined: 'None'
		};

		function getIncidentId() {
			return new URLSearchParams(window.location.search).get('id');
		}

		function getIncidents() {
			try { return JSON.parse(localStorage.getItem('incidents') || '[]'); } catch { return []; }
		}

		function getFaultTypeLabel(fault) {
			let val = fault;
			if (typeof val === 'string' && val.startsWith('Fault: ')) val = val.replace(/^Fault: /, '');
			if (typeof val === 'string' && !isNaN(Number(val))) val = Number(val);
			return FAULT_TYPE_MAP.hasOwnProperty(val) ? FAULT_TYPE_MAP[val] : val;
		}

		function renderIncidentDetails() {
			const id = getIncidentId();
			const incidents = getIncidents();
			const incident = incidents.find(inc => (inc.incident_id || inc.time || inc.timestamp) == id);

			if (!incident) {
				document.getElementById('incident-sections').innerHTML =
					'<div style="color:var(--danger);padding:2rem;text-align:center;">Incident not found.</div>';
				return;
			}

			const ft = getFaultTypeLabel(incident.fault);
			const avatar = (incident.fault || 'X')[0];
			const isFaulty = ft !== 'None';

			let html = `
				<div class="incident-detail-header">
					<div class="incident-detail-avatar">${avatar}</div>
					<div>
						<div class="incident-detail-title">${incident.root_cause || 'Fault detected'}</div>
						<div class="incident-detail-meta">
							<span class="badge ${isFaulty ? 'critical' : 'medium'}">${ft}</span>
							<span style="color:var(--text-muted);font-size:0.85rem;">
								${incident.timestamp ? new Date(incident.timestamp).toLocaleString() : (incident.time || '')}
							</span>
						</div>
					</div>
				</div>
			`;

			html += '<ul class="incident-details-list">';
			const skipKeys = new Set(['unread']);
			for (const [k, v] of Object.entries(incident)) {
				if (skipKeys.has(k)) continue;
				let displayVal;
				if (Array.isArray(v)) {
					displayVal = v.map(item => {
						if (typeof item === 'object' && item !== null) {
							const rec = item.Recommendation || item.recommendation || '';
							const desc = item.Description || item.description || '';
							return rec ? `<b>${rec}</b>${desc ? ' — ' + desc : ''}` : JSON.stringify(item);
						}
						return String(item);
					}).join('<br>');
				} else if (typeof v === 'object' && v !== null) {
					displayVal = '<pre style="margin:0;font-size:0.8rem;color:var(--text-secondary);white-space:pre-wrap;">' + JSON.stringify(v, null, 2) + '</pre>';
				} else {
					displayVal = String(v);
				}
				html += `<li>
					<span class="incident-details-label">${k.replace(/_/g, ' ')}</span>
					<span class="incident-details-value">${displayVal}</span>
				</li>`;
			}
			html += '</ul>';

			document.getElementById('incident-sections').innerHTML = html;
		}

		document.addEventListener('DOMContentLoaded', renderIncidentDetails);
	</script>
</body>
</html>
